<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud & Dog Cuties!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #a8d0e6;
            overflow-x: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 80px;
            font-size: 2rem;
        }

        /* Cloud Styles */
        .cloud-container {
            position: absolute;
            top: 0;
            width: 100%;
            height: 300px;
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 
                10px 10px 0 0 #fff,
                20px 10px 0 0 #fff,
                30px 0 0 0 #fff,
                -10px 10px 0 0 #fff,
                -20px 0 0 0 #fff;
            width: 80px;
            height: 50px;
            opacity: 0.9;
            animation: float linear infinite;
        }

        .cloud::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: #fff;
            border-radius: 5px;
        }

        .cloud-1 {
            top: 50px;
            left: -100px;
            animation-duration: 25s;
            transform: scale(1.2);
        }

        .cloud-2 {
            top: 120px;
            left: -100px;
            animation-duration: 18s;
            transform: scale(0.8);
        }

        .cloud-3 {
            top: 200px;
            left: -100px;
            animation-duration: 30s;
            transform: scale(1.5);
        }

        @keyframes float {
            0% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(calc(100vw + 200px)) translateY(-15px); }
            100% { transform: translateX(0) translateY(0); }
        }

        /* Dog Styles */
        .dog {
            position: relative;
            width: 180px;
            height: 150px;
            margin-top: 50px;
            animation: wag 2s ease-in-out infinite;
        }

        .dog-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 90px;
            background: #f1c27d;
            border-radius: 50%;
        }

        .dog-ear {
            position: absolute;
            top: -10px;
            width: 30px;
            height: 40px;
            background: #e0ac69;
            border-radius: 50%;
        }

        .ear-left { left: 10px; transform: rotate(-20deg); }
        .ear-right { right: 10px; transform: rotate(20deg); }

        .dog-eye {
            position: absolute;
            top: 30px;
            width: 12px;
            height: 12px;
            background: #2d2d2d;
            border-radius: 50%;
        }

        .eye-left { left: 25px; }
        .eye-right { right: 25px; }

        .dog-nose {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 18px;
            background: #2d2d2d;
            border-radius: 50%;
        }

        .dog-mouth {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 15px;
            border-bottom: 3px solid #2d2d2d;
            border-radius: 0 0 50% 50%;
        }

        .dog-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 70px;
            background: #f1c27d;
            border-radius: 50%;
        }

        .dog-tail {
            position: absolute;
            bottom: 40px;
            right: -15px;
            width: 30px;
            height: 15px;
            background: #e0ac69;
            border-radius: 50%;
            animation: tail-wag 1s ease-in-out infinite;
        }

        @keyframes wag {
            0% { transform: translateX(-50%) rotate(-2deg); }
            50% { transform: translateX(-50%) rotate(2deg); }
            100% { transform: translateX(-50%) rotate(-2deg); }
        }

        @keyframes tail-wag {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(30deg); }
            100% { transform: rotate(0deg); }
        }

        .grass {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: #55a630;
        }
    </style>
</head>
<body>
    <h1>☁️ Woof & Float! ☀️</h1>

    <div class="cloud-container">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>

    <div class="dog">
        <div class="dog-head">
            <div class="dog-ear ear-left"></div>
            <div class="dog-ear ear-right"></div>
            <div class="dog-eye eye-left"></div>
            <div class="dog-eye eye-right"></div>
            <div class="dog-nose"></div>
            <div class="dog-mouth"></div>
        </div>
        <div class="dog-body">
            <div class="dog-tail"></div>
        </div>
    </div>

    <div class="grass"></div>
</body>
</html>
